<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monkey Login</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background-color: #87c977e3;
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #2b2b2b;
            padding: 40px;
            border-radius: 10px;
            width: 300px;
        }

        h1 {
            text-align: center;
        }

        input {

            width: 100%;
            padding: 12px;
            margin-top: 10px;

            border: none;
            border-radius: 5px;

            box-sizing: border-box;
        }

        button {

            width: 100%;
            padding: 12px;
            margin-top: 15px;

            border: none;
            border-radius: 5px;

            color: white;
            cursor: pointer;
        }

        .login-btn {
            background-color: #4CAF50;
        }

        .login-btn:hover {
            background-color: #45a049;
        }

        .signup-btn {
            background-color: #2196F3;
        }

        .signup-btn:hover {
            background-color: #1976D2;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>🐒 Hey Monkey! </h1>

    <!-- LOGIN FORM -->
    <form action="/login" method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <button
            type="submit"
            class="login-btn"
        >
            Log In
        </button>

    </form>

    <!-- SIGNUP FORM -->
    <form action="/signup" method="POST">

        <input
            type="text"
            name="username"
            placeholder="New Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="New Password"
            required
        >

        <button
            type="submit"
            class="signup-btn"
        >
            Sign Up
        </button>

    </form>

</div>

</body>
</html>
