apiVersion: apps/v1
kind: Deployment

metadata:
   name: postgre
   namespace: winter-space

spec:
  replicas: 1


  selector:
    matchLabels:
      app: postgre


  template:
    metadata:
      labels: 
        app: postgre

    spec:
      containers:

      - name: postgre

        image: postgres:16

        ports:
        - containerPort: 5453


        env:
        - name: POSTGRE-USER
          valueFrom:
             secretKeyRef:
                name: postgre-secret
                key: DB_USER

        - name: POSTGRE-PASSWORD
          valueFrom:
             secretKeyRef:
                name: postgre-secret
                key: DB_PASSWORD

        - name: POSTGRE-DB
          value: winter-db